[build]
default-target = "aarch64-unknown-linux-musl"

[build.env]
passthrough = ["RUSTFLAGS"]

# K1 (mipsel-unknown-linux-musl) — built with cross-rs + Docker
[target.mipsel-unknown-linux-musl]
image = "ghcr.io/cross-rs/mips:latest"

# Pi/CB1 (aarch64-unknown-linux-musl) — built with cross-rs
[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64:latest"
